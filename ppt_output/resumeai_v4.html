<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vektor - V4 叙事引导</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;900&family=Noto+Sans+SC:wght@300;900&display=swap');
        :root{--p:#a78bfa;--s:#f472b6;--bg1:#18181b;--bg2:#09090b;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Noto Sans SC','Inter',sans-serif;background:#09090b;color:#fff;overflow:hidden;}
        .vp{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;}
        .cv{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;overflow:hidden;}
        .sp{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(160deg,var(--bg1),var(--bg2));opacity:0;pointer-events:none;transition:opacity .8s;}
        .sp.on{opacity:1;pointer-events:auto;}
        .gl{position:absolute;width:50%;height:50%;border-radius:50%;filter:blur(100px);opacity:.06;}
        .g1{top:-10%;right:-5%;background:var(--p);animation:dr 20s infinite alternate ease-in-out;}
        .g2{bottom:-10%;left:20%;background:var(--s);animation:dr 20s infinite alternate-reverse ease-in-out;}
        @keyframes dr{to{transform:translate(-5%,8%);}}
        .cw{position:relative;z-index:10;padding:0 12%;display:flex;flex-direction:column;align-items:flex-start;text-align:left;gap:1.3rem;max-width:80%;}
        .cw.ctr{align-items:center;text-align:center;max-width:100%;}
        .t1{font-weight:900;font-size:clamp(3rem,7vw,6rem);line-height:1.1;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;color:transparent;}
        .st{font-weight:300;font-size:clamp(1.1rem,2.2vw,1.8rem);line-height:1.7;color:#a1a1aa;}
        .tg{font-size:clamp(.7rem,1.1vw,.95rem);letter-spacing:.15em;text-transform:uppercase;color:#52525b;}
        .s{font-weight:300;font-size:clamp(1.3rem,2.8vw,2.2rem);line-height:1.6;color:#d4d4d8;}
        .s em{font-style:normal;font-weight:900;color:#fff;} .s .pp{color:var(--p);font-weight:900;} .s .pk{color:var(--s);font-weight:900;}

        /* A1: SLIDE RIGHT */
        .sp.on .a-sr{animation:sr .7s ease-out both;}
        .sp.on .a-sr-d1{animation:sr .7s .12s ease-out both;}
        .sp.on .a-sr-d2{animation:sr .7s .24s ease-out both;}
        .sp.on .a-sr-d3{animation:sr .7s .36s ease-out both;}
        @keyframes sr{from{opacity:0;transform:translateX(-45px);}to{opacity:1;transform:none;}}

        /* A2: BOUNCE DROP */
        .sp.on .a-bounce{animation:bounce .7s cubic-bezier(.34,1.56,.64,1) both;}
        @keyframes bounce{0%{opacity:0;transform:translateY(-55px) scale(.8);}60%{transform:translateY(6px) scale(1.04);}100%{opacity:1;transform:none;}}

        /* A3: CURTAIN */
        .sp.on .a-curtain{animation:curtain .8s cubic-bezier(.16,1,.3,1) both;}
        .sp.on .a-curtain-d1{animation:curtain .8s .15s cubic-bezier(.16,1,.3,1) both;}
        .sp.on .a-curtain-d2{animation:curtain .8s .3s cubic-bezier(.16,1,.3,1) both;}
        @keyframes curtain{0%{clip-path:inset(0 50% 0 50%);opacity:.5;}100%{clip-path:inset(0 0 0 0);opacity:1;}}

        /* A4: GRADIENT FLOW */
        .gf{background:linear-gradient(90deg,var(--p),var(--s),var(--p));background-size:200% 100%;-webkit-background-clip:text;color:transparent;animation:gFlow 4s linear infinite;}
        @keyframes gFlow{0%{background-position:0% 0;}100%{background-position:200% 0;}}

        /* A5: SPOTLIGHT */
        .spot{position:relative;display:inline;}
        .spot::after{content:'';position:absolute;inset:-4px -8px;border-radius:6px;z-index:-1;background:rgba(167,139,250,0);}
        .sp.on .spot::after{animation:spotIn .6s .5s ease-out forwards;}
        @keyframes spotIn{to{background:rgba(167,139,250,.12);}}

        /* A6: TITLE GLOW */
        .sp.on .a-glow{animation:sr .7s ease-out,titleG 3s 1s ease-in-out infinite;}
        @keyframes titleG{0%,100%{filter:brightness(1);text-shadow:none;}50%{filter:brightness(1.2);text-shadow:0 0 40px rgba(167,139,250,.4),0 0 80px rgba(244,114,182,.2);}}

        /* A7: DRAW UNDERLINE */
        .dul{position:relative;display:inline-block;}
        .dul::after{content:'';position:absolute;left:0;bottom:-3px;width:0;height:2px;border-radius:1px;background:linear-gradient(90deg,var(--p),var(--s));}
        .sp.on .dul::after{animation:drawL .8s .6s ease-out forwards;}
        @keyframes drawL{to{width:100%;}}

        .nb{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100;}
        .nd{width:8px;height:8px;border-radius:2px;background:rgba(255,255,255,.12);cursor:pointer;transition:all .3s;}
        .nd.on{background:var(--p);width:24px;}
        .sc{position:fixed;top:24px;right:32px;font-size:14px;color:rgba(255,255,255,.2);font-family:'Inter',monospace;z-index:100;}
    </style>
</head>
<body>
<div id="app">
    <div class="vp"><div class="cv">
        <div v-for="(s,i) in slides" :key="i" class="sp" :class="{on:cur===i}">
            <div class="gl g1"></div><div class="gl g2"></div>
            <div class="cw" :class="s.c?'ctr':''" v-html="s.h"></div>
        </div>
    </div></div>
    <div class="nb"><div v-for="(s,i) in slides" :key="i" class="nd" :class="{on:cur===i}" @click="cur=i"></div></div>
    <div class="sc">{{cur+1}} / {{slides.length}}</div>
</div>
<script>
const {createApp,ref}=Vue;
createApp({setup(){
    const cur=ref(0);
    const slides=ref([
        {c:1,h:`<p class="tg a-sr">一个真实的求职故事</p><h1 class="t1 a-glow">Vektor</h1><p class="st a-sr-d2">从痛苦到顺滑的求职体验</p>`},
        {h:`<p class="s a-sr">小明在 LinkedIn 上看到了<br>一个<em>心动的职位</em>。</p>`},
        {h:`<p class="s a-sr">他打开 Word，翻出上次的简历，</p><p class="s a-sr-d1">逐字读 JD，猜哪些关键词重要，</p><p class="s a-sr-d2">凭感觉改了几句措辞——</p><p class="s a-sr-d3" style="color:#71717a;">匹配度多少？不知道。</p>`},
        {h:`<p class="s a-sr">Cover Letter？</p><p class="s a-sr-d1">复制上一份，<em>改了个公司名</em>。</p><p class="s a-sr-d2" style="color:#71717a;">再认真写一封？算了吧。</p>`},
        {h:`<p class="s a-sr">投了十个职位，</p><p class="s a-sr-d1">哪个什么状态？<em>忘了</em>。</p><p class="s a-sr-d2" style="color:#71717a;">开了个 Excel，记了两天就没再打开。</p>`},
        {c:1,h:`<h1 class="t1 a-bounce">直到他装了<br>一个插件</h1>`},
        {h:`<p class="s a-sr">点<span class="spot">「分析」</span>——</p><p class="s a-sr-d1">匹配度 <em>82%</em>，核心要求满足 7/9</p><p class="s a-sr-d2">缺 <span class="pk">Kubernetes</span>，建议补充相关经历。</p><p class="s a-sr-d3" style="color:#71717a;">当场就知道了。</p>`},
        {h:`<p class="s a-sr">点<span class="spot">「保存」</span>——</p><p class="s a-curtain" style="animation-delay:.15s;">后台自动运行：<span class="pp">JD 分析</span> → <span class="pk">Cover Letter</span> → 简历建议</p><p class="s a-sr-d2" style="color:#71717a;">全部自动，他什么都不用做。</p>`},
        {h:`<p class="s a-sr">分析完了。Cover Letter 生成好了。</p><p class="s a-sr-d1"><span class="dul">一键应用到简历</span>——不用抄，不用切。</p>`},
        {h:`<p class="s a-sr">他又在 Boss直聘 和 CTgoodjobs 上<br>各保存了几个职位。</p><p class="s a-sr-d1">同一个插件，<em>五个平台</em>都能用。</p><p class="tg a-sr-d2" style="margin-top:.8rem;">LINKEDIN · INDEED · JOBSDB · CTGOODJOBS · BOSS直聘</p>`},
        {h:`<p class="s a-sr">投过的职位自动进<span class="pp">看板</span>。</p><p class="s a-curtain" style="animation-delay:.15s;">Pending → Ready → Applied</p><p class="s a-sr-d2" style="color:#71717a;">不用再开 Excel 了。</p>`},
        {h:`<p class="s a-sr">然后小明要投一家<em>香港本地公司</em>——</p><p class="s a-sr-d1">需要<span class="pk">繁体</span>简历。</p><p class="s a-sr-d2">另一家外企，需要<span class="pp">英文</span>版。</p>`},
        {h:`<p class="s a-sr">内地朋友内推，又要<em>简体</em>版。</p><p class="s a-sr-d1" style="color:#71717a;">三份简历，改了一处都要改三次。</p><p class="s a-sr-d2" style="color:#71717a;">还容易改漏、改错。</p>`},
        {c:1,h:`<h1 class="t1 a-glow">点一下<br>切语言</h1><p class="st a-sr-d2">内容自动转换，一份简历三个版本</p>`},
        {h:`<p class="s a-sr">切到繁体——</p><p class="s a-curtain" style="animation-delay:.15s;">「软件」自动变成「<span class="pk">軟件</span>」</p><p class="s a-curtain-d1">「信息」自动变成「<span class="pk">資訊</span>」</p><p class="s a-sr-d3" style="color:#71717a;">不是乱码替换，是词级精确对应。</p>`},
        {h:`<p class="s a-sr">再切到英文——</p><p class="s a-curtain" style="animation-delay:.15s;">「腾讯」变成 <span class="pp">Tencent</span></p><p class="s a-curtain-d1" style="font-size:clamp(1.2rem,2.5vw,2rem);">「港大」变成 <span class="pp">The University of Hong Kong</span></p><p class="s a-sr-d3">技术术语<em>原样保留</em>，API 可自由配置。</p>`},
        {h:`<p class="s a-sr">切回简体——</p><p class="s a-sr-d1">中文名还是他当初打的。</p><p class="s a-sr-d2"><span class="dul">名称快照</span>——切走前自动保存，切回来直接恢复。</p>`},
        {c:1,h:`<h1 class="t1 a-bounce">一份简历<br><span class="gf" style="font-weight:900;font-size:inherit;line-height:inherit;">三语通用</span></h1><p class="st a-sr-d2">改一处，三个版本自动同步</p>`},
        {h:`<p class="tg a-sr">不只是翻译</p><p class="s a-sr-d1"><em>JD 匹配</em> · <em>简历评审</em> · <em>逐条优化</em></p><p class="s a-sr-d2"><em>Cover Letter</em> · <em>智能翻译</em> · <em>简历解析</em></p><p class="s a-sr-d3" style="color:#71717a;">六大 AI 能力，覆盖求职全流程。</p>`},
        {c:1,h:`<h1 class="t1 a-glow" style="font-size:clamp(3rem,7vw,6rem);">刷着刷着<br>就投完了</h1><p class="tg a-sr-d2">VEKTOR</p>`},
    ]);
    window.addEventListener('keydown',e=>{
        if(['ArrowRight','ArrowDown',' '].includes(e.key)&&cur.value<slides.value.length-1)cur.value++;
        if(['ArrowLeft','ArrowUp'].includes(e.key)&&cur.value>0)cur.value--;
    });
    return{cur,slides};
}}).mount('#app');
</script>
</body>
</html>
